<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training Signup — ZMA ARTCC</title>
  <style>/* ============================================================
   ZMA ARTCC TRAINING PORTAL — SHARED STYLES
   Professional, clean, white + blue palette
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --blue-900: #0a1628;
  --blue-800: #0e2044;
  --blue-700: #1a3a6b;
  --blue-600: #1e4d8c;
  --blue-500: #2563a8;
  --blue-400: #3b82c4;
  --blue-300: #60a5d8;
  --blue-200: #bfdbf7;
  --blue-100: #dbeafe;
  --blue-50:  #eff6ff;
  --white:    #ffffff;
  --gray-50:  #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --red-500:  #ef4444;
  --red-100:  #fee2e2;
  --green-500:#22c55e;
  --green-100:#dcfce7;
  --yellow-500:#eab308;
  --yellow-100:#fef9c3;

  --font-main: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;

  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 16px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 10px 30px rgba(0,0,0,.12);

  --nav-height: 64px;
  --sidebar-width: 220px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; }

body {
  font-family: var(--font-main);
  background: var(--white);
  color: var(--gray-800);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   TOP NAV
   ============================================================ */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-height);
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center;
  padding: 0 32px;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.nav-brand {
  display: flex; align-items: center; gap: 12px;
  font-weight: 700; font-size: 1.05rem;
  color: var(--blue-800);
  text-decoration: none;
}

.nav-brand-badge {
  background: var(--blue-700);
  color: var(--white);
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .08em;
  padding: 2px 8px;
  border-radius: 4px;
}

.nav-links {
  display: flex; align-items: center; gap: 6px;
  margin-left: auto;
}

.nav-link {
  font-size: .875rem;
  font-weight: 500;
  color: var(--gray-600);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  transition: background .15s, color .15s;
}
.nav-link:hover { background: var(--gray-100); color: var(--gray-800); }
.nav-link.active { background: var(--blue-50); color: var(--blue-700); }

/* ============================================================
   PAGE WRAPPER
   ============================================================ */
.page-wrapper {
  padding-top: var(--nav-height);
  min-height: 100vh;
}

.page-container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 32px;
}

.page-header {
  margin-bottom: 32px;
}
.page-header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--blue-900);
  letter-spacing: -.02em;
}
.page-header p {
  color: var(--gray-500);
  margin-top: 4px;
  font-size: .9rem;
}

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-sm);
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.card-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--gray-800);
}

/* ============================================================
   FORMS
   ============================================================ */
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: .8rem;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--gray-500);
  margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: var(--font-main);
  font-size: .9rem;
  color: var(--gray-800);
  background: var(--white);
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--blue-400);
  box-shadow: 0 0 0 3px rgba(37,99,168,.1);
}
.form-select { cursor: pointer; }
.form-textarea { min-height: 100px; resize: vertical; }

/* Training type select groups */
.select-group-label {
  font-weight: 700;
  color: var(--blue-600);
  font-size: .85rem;
  background: transparent;
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }

/* Checkbox */
.checkbox-wrap {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--blue-50);
  border: 1px solid var(--blue-200);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
}
.checkbox-wrap input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--blue-600);
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
}
.checkbox-label {
  font-size: .875rem;
  color: var(--gray-700);
  line-height: 1.5;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-main);
  font-size: .875rem;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-sm);
  padding: 9px 18px;
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
  white-space: nowrap;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }

.btn-primary {
  background: var(--blue-600);
  color: var(--white);
}
.btn-primary:hover:not(:disabled) { background: var(--blue-700); }

.btn-secondary {
  background: var(--gray-100);
  color: var(--gray-700);
}
.btn-secondary:hover:not(:disabled) { background: var(--gray-200); }

.btn-success {
  background: var(--green-500);
  color: var(--white);
}
.btn-success:hover:not(:disabled) { background: #16a34a; }

.btn-danger {
  background: var(--red-500);
  color: var(--white);
}
.btn-danger:hover:not(:disabled) { background: #dc2626; }

.btn-ghost {
  background: transparent;
  color: var(--blue-600);
  padding: 6px 10px;
}
.btn-ghost:hover:not(:disabled) { background: var(--blue-50); }

.btn-sm { padding: 5px 12px; font-size: .8rem; }
.btn-lg { padding: 12px 28px; font-size: 1rem; width: 100%; justify-content: center; }

/* ============================================================
   TABLES
   ============================================================ */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--gray-500);
  padding: 10px 14px;
  text-align: left;
  background: var(--gray-50);
  border-bottom: 1px solid var(--gray-200);
}
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--gray-100);
  font-size: .875rem;
  color: var(--gray-700);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--blue-50); }

.cid-link {
  color: var(--blue-600);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: .8rem;
  font-weight: 500;
}
.cid-link:hover { text-decoration: underline; }

/* ============================================================
   BADGES / STATUS
   ============================================================ */
.badge {
  display: inline-flex; align-items: center;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .03em;
  padding: 3px 10px;
  border-radius: 100px;
}
.badge-blue    { background: var(--blue-100); color: var(--blue-700); }
.badge-green   { background: var(--green-100); color: #16a34a; }
.badge-red     { background: var(--red-100); color: #dc2626; }
.badge-yellow  { background: var(--yellow-100); color: #a16207; }
.badge-gray    { background: var(--gray-100); color: var(--gray-600); }

/* ============================================================
   TABS (admin sidebar)
   ============================================================ */
.admin-layout {
  display: flex;
  gap: 0;
  min-height: calc(100vh - var(--nav-height));
}

.admin-sidebar {
  width: var(--sidebar-width);
  background: var(--gray-50);
  border-right: 1px solid var(--gray-200);
  padding: 24px 0;
  flex-shrink: 0;
  position: sticky;
  top: var(--nav-height);
  height: calc(100vh - var(--nav-height));
  overflow-y: auto;
}

.sidebar-section {
  padding: 0 12px;
  margin-bottom: 8px;
}
.sidebar-label {
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--gray-400);
  padding: 4px 8px 8px;
}
.sidebar-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  font-family: var(--font-main);
  font-size: .875rem;
  font-weight: 500;
  color: var(--gray-600);
  cursor: pointer;
  transition: all .12s;
  text-align: left;
}
.sidebar-btn:hover { background: var(--gray-200); color: var(--gray-800); }
.sidebar-btn.active { background: var(--blue-600); color: var(--white); }

.notif-dot {
  background: var(--red-500);
  color: var(--white);
  font-size: .65rem;
  font-weight: 700;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

.admin-content {
  flex: 1;
  padding: 32px;
  overflow-y: auto;
}

/* ============================================================
   MODALS
   ============================================================ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--white);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 32px;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px);
  transition: transform .2s;
}
.modal-backdrop.open .modal { transform: translateY(0); }
.modal-lg { max-width: 780px; }
.modal-xl { max-width: 1000px; }

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.modal-title { font-size: 1.1rem; font-weight: 700; color: var(--blue-900); }
.modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--gray-400); font-size: 1.3rem;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  transition: background .12s;
}
.modal-close:hover { background: var(--gray-100); color: var(--gray-700); }

/* ============================================================
   STATS BOXES
   ============================================================ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.stat-box {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 20px 24px;
  box-shadow: var(--shadow-sm);
}
.stat-label {
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 6px;
}
.stat-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--blue-700);
  line-height: 1;
}
.stat-sub {
  font-size: .75rem;
  color: var(--gray-400);
  margin-top: 4px;
}

/* ============================================================
   TOASTS
   ============================================================ */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--gray-800);
  color: var(--white);
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: .875rem;
  font-weight: 500;
  z-index: 999;
  transform: translateY(20px);
  opacity: 0;
  transition: all .25s;
  max-width: 360px;
  box-shadow: var(--shadow-lg);
}
.toast--show { opacity: 1; transform: translateY(0); }
.toast--error { background: var(--red-500); }
.toast--success { background: var(--green-500); }

/* ============================================================
   EMPTY STATES
   ============================================================ */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-400);
}
.empty-state-icon { font-size: 2rem; margin-bottom: 12px; }
.empty-state-text { font-size: .9rem; }

/* ============================================================
   DRAG + DROP ROWS
   ============================================================ */
tr.dragging { opacity: .4; }
tr.drag-over td { border-top: 2px solid var(--blue-400); }

/* ============================================================
   LOADING
   ============================================================ */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--gray-200);
  border-top-color: var(--blue-500);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-overlay {
  display: flex; align-items: center; justify-content: center;
  padding: 40px;
}

/* ============================================================
   EXAM QUESTION BUILDER
   ============================================================ */
.question-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
}
.question-card-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
}
.question-num {
  font-size: .8rem;
  font-weight: 700;
  color: var(--blue-600);
  background: var(--blue-50);
  padding: 2px 8px;
  border-radius: 4px;
}

/* ============================================================
   EXAM TAKING LAYOUT
   ============================================================ */
.exam-layout {
  display: flex;
  gap: 0;
  min-height: calc(100vh - var(--nav-height));
}

.exam-sidebar {
  width: 200px;
  background: var(--gray-50);
  border-right: 1px solid var(--gray-200);
  padding: 20px 12px;
  flex-shrink: 0;
  position: sticky;
  top: var(--nav-height);
  height: calc(100vh - var(--nav-height));
  overflow-y: auto;
}
.exam-q-btn {
  width: 100%;
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--gray-200);
  background: var(--white);
  font-size: .8rem;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 4px;
  text-align: left;
  color: var(--gray-700);
  transition: all .12s;
}
.exam-q-btn:hover { background: var(--blue-50); }
.exam-q-btn.answered { background: var(--blue-100); border-color: var(--blue-300); color: var(--blue-700); }
.exam-q-btn.flagged { background: var(--yellow-100); border-color: var(--yellow-500); }

.exam-main { flex: 1; padding: 32px; overflow-y: auto; }

.exam-timer {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--blue-700);
  background: var(--blue-50);
  padding: 6px 16px;
  border-radius: var(--radius-sm);
}
.exam-timer.warning { color: var(--red-500); background: var(--red-100); }

.progress-bar-wrap { background: var(--gray-200); border-radius: 100px; height: 6px; margin: 12px 0; }
.progress-bar { background: var(--blue-500); height: 6px; border-radius: 100px; transition: width .3s; }

/* Matching question */
.matching-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.matching-left {
  flex: 1;
  padding: 8px 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: .875rem;
}

/* ============================================================
   TRAINER CARD
   ============================================================ */
.trainer-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 20px;
}
.trainer-name { font-weight: 700; font-size: 1rem; color: var(--blue-900); }
.trainer-rating {
  display: inline-block;
  font-size: .75rem;
  font-weight: 700;
  background: var(--blue-700);
  color: var(--white);
  padding: 2px 8px;
  border-radius: 4px;
  margin: 4px 0 8px;
}
.trainer-certs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.trainer-cert {
  font-size: .7rem;
  font-weight: 700;
  background: var(--blue-50);
  color: var(--blue-700);
  border: 1px solid var(--blue-200);
  padding: 2px 8px;
  border-radius: 4px;
}
.trainer-students {
  font-size: 2rem;
  font-weight: 700;
  color: var(--blue-600);
  margin-top: 10px;
}
.trainer-students-label { font-size: .75rem; color: var(--gray-400); }

/* ============================================================
   COLLAPSIBLE
   ============================================================ */
.collapsible-header {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  padding: 12px 16px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
  transition: background .12s;
}
.collapsible-header:hover { background: var(--gray-100); }
.collapsible-body { display: none; padding: 12px 0; }
.collapsible-body.open { display: block; }

/* ============================================================
   MISC
   ============================================================ */
.section-divider {
  border: none;
  border-top: 1px solid var(--gray-200);
  margin: 28px 0;
}

.text-muted { color: var(--gray-400); font-size: .875rem; }
.text-mono { font-family: var(--font-mono); }
.text-danger { color: var(--red-500); }
.text-success { color: var(--green-500); }

.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.ml-auto { margin-left: auto; }
.mt-4 { margin-top: 16px; }
.mb-4 { margin-bottom: 16px; }

.note-chip {
  background: var(--yellow-100);
  border: 1px solid var(--yellow-500);
  color: #a16207;
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: .8rem;
  margin-bottom: 4px;
}

/* Drag handle */
.drag-handle {
  cursor: grab;
  color: var(--gray-300);
  font-size: 1rem;
  padding: 0 4px;
}
.drag-handle:active { cursor: grabbing; }
</style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    body { background: var(--gray-50); }
    .signup-wrap { max-width: 620px; margin: 0 auto; padding: 40px 24px; }
    .signup-header { text-align: center; margin-bottom: 40px; }
    .signup-header .artcc-badge {
      display: inline-block; background: var(--blue-700); color: var(--white);
      font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 4px 14px; border-radius: 100px; margin-bottom: 14px;
    }
    .signup-header h1 { font-size: 1.9rem; font-weight: 700; color: var(--blue-900); letter-spacing: -.03em; }
    .signup-header p { color: var(--gray-500); margin-top: 8px; font-size: .9rem; }
    .cid-status { font-size: .8rem; margin-top: 6px; min-height: 20px; display: flex; align-items: center; gap: 6px; }
    .cid-status.found { color: #16a34a; }
    .cid-status.not-found { color: var(--red-500); }
    .cid-status.loading { color: var(--gray-400); }
    .submit-section { margin-top: 8px; }
    .success-state { text-align: center; padding: 48px 20px; }
    .success-state .checkmark {
      width: 64px; height: 64px; background: var(--green-100); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 1.6rem;
    }
    .success-state h2 { font-size: 1.4rem; font-weight: 700; color: var(--blue-900); margin-bottom: 8px; }
    .success-state p { color: var(--gray-500); font-size: .9rem; }
  </style>
</head>
<body>
  <div class="signup-wrap">
    <div class="signup-header">
      <span class="artcc-badge">ZMA Miami ARTCC</span>
      <h1>Training Signup</h1>
      <p>Submit your request to join the ZMA training queue.</p>
    </div>

    <div class="card" id="formCard">
      <form id="signupForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" id="firstName" placeholder="Enter first name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" id="lastName" placeholder="Enter last name" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">VATSIM CID</label>
          <input type="text" class="form-input" id="cid" placeholder="e.g. 1234567" required pattern="\d+" inputmode="numeric">
          <div class="cid-status" id="cidStatus"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
          <label class="form-label">Rating / Training Type</label>
          <select class="form-select" id="trainingType" required>
            <option value="">Select your training type...</option>
            <optgroup label="S1 Training">
              <option value="S1 Training (Tier 2)">S1 Training (Tier 2)</option>
              <option value="S1 Training (Unrestricted)">S1 Training (Unrestricted)</option>
            </optgroup>
            <optgroup label="S2 Training">
              <option value="S2 Training (Tier 2)">S2 Training (Tier 2)</option>
              <option value="S2 Training (Unrestricted)">S2 Training (Unrestricted)</option>
            </optgroup>
            <optgroup label="S3 Training">
              <option value="S3 Training (Tier 2)">S3 Training (Tier 2)</option>
              <option value="S3 Training (Unrestricted)">S3 Training (Unrestricted)</option>
            </optgroup>
            <optgroup label="C1 Training">
              <option value="C1 Training">C1 Training</option>
            </optgroup>
            <optgroup label="Center &amp; Oceanic">
              <option value="Miami Center Oceanic">Miami Center Oceanic</option>
            </optgroup>
            <optgroup label="Tier 1">
              <option value="Tier 1 MIA GND/DEL">Tier 1 MIA GND/DEL</option>
              <option value="Tier 1 MIA LCL">Tier 1 MIA LCL</option>
              <option value="Tier 1 MIA TRACON">Tier 1 MIA TRACON</option>
            </optgroup>
            <optgroup label="Visitor / Transfer">
              <option value="Visitor/Transfer — Miami Center Domestic">Visitor/Transfer — Miami Center Domestic</option>
              <option value="Visitor/Transfer — Miami CAB">Visitor/Transfer — Miami CAB</option>
            </optgroup>
          </select>
        </div>

        <div class="form-group">
          <label class="checkbox-wrap">
            <input type="checkbox" id="acknowledge" required>
            <span class="checkbox-label">
              I understand that all coursework must be completed before entering the training queue. Failure to uphold this will result in removal from the queue/training assignment.
            </span>
          </label>
        </div>

        <div class="submit-section">
          <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
            Submit Training Request
          </button>
        </div>
      </form>
    </div>

    <div class="card" id="successCard" style="display:none;">
      <div class="success-state">
        <div class="checkmark">&#10003;</div>
        <h2>Request Submitted</h2>
        <p>Your training request is now pending approval. A confirmation email has been sent to your registered VATSIM email address. You will be notified when your request is reviewed.</p>
        <button class="btn btn-secondary mt-4" onclick="resetForm()">Submit Another Request</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY);
    let cidLookupTimer, resolvedEmail = '', cidLookupValid = false;
    const cidInput = document.getElementById('cid');
    const cidStatus = document.getElementById('cidStatus');

    cidInput.addEventListener('input', () => {
      clearTimeout(cidLookupTimer);
      const val = cidInput.value.trim();
      cidStatus.innerHTML = ''; cidLookupValid = false; resolvedEmail = '';
      if (!val || val.length < 4) return;
      cidStatus.className = 'cid-status loading';
      cidStatus.innerHTML = '<span class="spinner"></span> Looking up CID...';
      cidLookupTimer = setTimeout(() => lookupCID(val), 800);
    });

    async function lookupCID(cid) {
      try {
        const ctrl = await VATUSA.getController(cid);
        if (!ctrl) {
          cidStatus.className = 'cid-status not-found';
          cidStatus.innerHTML = 'CID not found in VATSIM.';
          return;
        }
        cidLookupValid = true;
        try {
          const emailRes = await fetch(`${CONFIG.VATUSA_API}/user/${cid}/email?apikey=${CONFIG.VATUSA_API_KEY}`);
          const emailData = await emailRes.json();
          resolvedEmail = emailData.email || '';
        } catch {}
        cidStatus.className = 'cid-status found';
        cidStatus.innerHTML = `&#10003; Found: ${ctrl.fname} ${ctrl.lname} &mdash; ${VATUSA.ratingName(ctrl.rating)}`;
      } catch {
        cidStatus.className = 'cid-status not-found';
        cidStatus.innerHTML = 'Unable to verify CID. Please try again.';
      }
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Submitting...';
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const cid = document.getElementById('cid').value.trim();
      const trainingType = document.getElementById('trainingType').value;
      let category = 'S1 Training';
      if (trainingType.startsWith('S2')) category = 'S2 Training';
      else if (trainingType.startsWith('S3')) category = 'S3 Training';
      else if (trainingType.startsWith('C1')) category = 'C1 Training';
      else if (trainingType.includes('Oceanic')) category = 'Center & Oceanic';
      else if (trainingType.startsWith('Tier 1')) category = 'Tier 1';
      else if (trainingType.startsWith('Visitor')) category = 'Visitor / Transfer';
      try {
        const emailAddr = document.getElementById('email').value.trim();
        await SB.insert('training_requests', {
          first_name: firstName, last_name: lastName, cid,
          email: emailAddr, training_type: trainingType,
          training_category: category, status: 'pending',
        });
        if (emailAddr) await EM.sendTrainingConfirmation(emailAddr, `${firstName} ${lastName}`, trainingType);
        document.getElementById('formCard').style.display = 'none';
        document.getElementById('successCard').style.display = 'block';
      } catch (err) {
        toast('Error submitting request. Please try again.', 'error');
        console.error(err);
        btn.disabled = false;
        btn.innerHTML = 'Submit Training Request';
      }
    });

    function resetForm() {
      document.getElementById('signupForm').reset();
      document.getElementById('email').value = '';
      document.getElementById('cidStatus').innerHTML = '';
      cidLookupValid = false; resolvedEmail = '';
      document.getElementById('formCard').style.display = 'block';
      document.getElementById('successCard').style.display = 'none';
    }
  </script>
</body>
</html>
